<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --bg: #0a0e17; --bg2: #111827; --bg3: #1f2937; --surface: rgba(255,255,255,0.03);
    --border: rgba(255,255,255,0.08); --text: #f9fafb; --text2: #9ca3af; --text3: #6b7280;
    --accent: #3b82f6; --accent2: #60a5fa; --green: #10b981; --red: #ef4444;
    --amber: #f59e0b; --purple: #8b5cf6; --cyan: #06b6d4; --pink: #ec4899;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
.container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }

/* Header */
.header { text-align: center; padding: 1.5rem 0 1rem; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
.logo { font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.subtitle { color: var(--text2); font-size: 0.8rem; margin-top: 0.25rem; }

/* Search Box */
.search-box { display: flex; gap: 0.5rem; max-width: 600px; margin: 0 auto 1.5rem; flex-wrap: wrap; justify-content: center; align-items: center; }
.search-input { flex: 1; min-width: 180px; padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid var(--border); background: var(--bg2); color: var(--text); font-size: 0.9rem; }
.search-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
.param-label { color: var(--text3); font-size: 0.75rem; white-space: nowrap; }
.param-input { width: 60px; padding: 0.4rem; border-radius: 6px; border: 1px solid var(--border); background: var(--bg2); color: var(--text); font-size: 0.8rem; text-align: center; }
.search-btn { padding: 0.75rem 1.5rem; border-radius: 8px; border: none; background: linear-gradient(135deg, var(--accent), var(--purple)); color: #fff; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
.search-btn:hover { opacity: 0.9; }
.search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Grid layouts */
.grid { display: grid; gap: 1rem; }
.grid-2 { grid-template-columns: repeat(2, 1fr); }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-4 { grid-template-columns: repeat(4, 1fr); }
.grid-5 { grid-template-columns: repeat(5, 1fr); }
@media (max-width: 1100px) { .grid-4, .grid-5 { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 800px) { .grid-2, .grid-3, .grid-4, .grid-5 { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 500px) { .grid-2, .grid-3, .grid-4, .grid-5 { grid-template-columns: 1fr; } }

/* Cards */
.card { background: var(--bg2); border-radius: 12px; border: 1px solid var(--border); overflow: visible; margin-bottom: 1rem; }
.card-header { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 0.8rem; display: flex; align-items: center; gap: 0.5rem; color: var(--text); }
.card-header .icon { font-size: 0.95rem; }
.card-body { padding: 0.875rem; }

/* Stock Header */
.stock-header { display: grid; grid-template-columns: 1fr auto 1fr; gap: 1rem; align-items: center; padding: 1rem 1.25rem; background: var(--bg2); border-radius: 12px; margin-bottom: 1rem; border: 1px solid var(--border); }
.stock-left { min-width: 0; }
.stock-name { font-size: 1.25rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.stock-code { color: var(--text2); font-size: 0.7rem; margin-top: 0.125rem; font-family: 'JetBrains Mono', monospace; }
.stock-price-wrap { text-align: center; border-left: 1px solid var(--border); border-right: 1px solid var(--border); padding: 0 1.25rem; min-width: 160px; }
.stock-price { font-size: 1.75rem; font-weight: 800; font-family: 'JetBrains Mono', monospace; white-space: nowrap; }
.stock-price.up { color: var(--green); }
.stock-price.down { color: var(--red); }
.stock-change { font-size: 0.8rem; margin-top: 0.2rem; font-family: 'JetBrains Mono', monospace; }
.stock-change.up { color: var(--green); }
.stock-change.down { color: var(--red); }
.stock-right { display: flex; flex-direction: column; gap: 0.375rem; align-items: flex-end; }
.stock-meta { font-size: 0.7rem; color: var(--text2); font-family: 'JetBrains Mono', monospace; line-height: 1.6; text-align: right; }

/* Metric Cards */
.metric-card { background: var(--bg2); border-radius: 8px; padding: 0.875rem 1rem; border: 1px solid var(--border); text-align: center; transition: border-color 0.2s; min-width: 0; }
.metric-card:hover { border-color: var(--accent); }
.metric-label { font-size: 0.65rem; color: var(--text3); margin-bottom: 0.3rem; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
.metric-value { font-size: 1.1rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; line-height: 1.2; word-break: break-all; }
.metric-value.up, .metric-value.excellent { color: var(--green); }
.metric-value.down, .metric-value.bad { color: var(--red); }
.metric-value.neutral, .metric-value.warning { color: var(--text); }
.metric-value.good { color: var(--cyan); }
.metric-sub { font-size: 0.6rem; color: var(--text3); margin-top: 0.2rem; line-height: 1.3; }

/* Indicator Card with Tooltip */
.indicator-card { background: var(--bg2); border-radius: 8px; padding: 0.5rem 0.625rem; border: 1px solid var(--border); position: relative; cursor: help; transition: all 0.2s; min-width: 0; }
.indicator-card:hover { border-color: var(--accent); background: rgba(59,130,246,0.05); z-index: 10; }
.indicator-label { font-size: 0.6rem; color: var(--text3); margin-bottom: 0.1rem; text-transform: uppercase; letter-spacing: 0.3px; }
.indicator-value { font-size: 0.85rem; font-weight: 600; font-family: 'JetBrains Mono', monospace; word-break: break-all; }
.indicator-tooltip { position: absolute; top: auto; bottom: calc(100% + 12px); left: 50%; transform: translateX(-50%); background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem; width: 240px; font-size: 0.75rem; color: var(--text2); line-height: 1.6; z-index: 200; opacity: 0; visibility: hidden; transition: opacity 0.2s, visibility 0.2s; pointer-events: none; box-shadow: 0 10px 40px rgba(0,0,0,0.6); white-space: normal; }
.indicator-tooltip::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 6px solid transparent; border-top-color: var(--border); }
.indicator-tooltip::before { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 5px solid transparent; border-top-color: var(--bg3); z-index: 1; }
.indicator-card:hover .indicator-tooltip { opacity: 1; visibility: visible; }
.tooltip-title { font-weight: 600; color: var(--text); margin-bottom: 0.25rem; font-size: 0.8rem; }
.tooltip-formula { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--cyan); margin-bottom: 0.375rem; }
.tooltip-advice { color: var(--amber); font-size: 0.7rem; }

/* Signals */
.signal-item { padding: 0.625rem 0.875rem; border-radius: 8px; margin-bottom: 0.4rem; border-left: 3px solid; }
.signal-item:last-child { margin-bottom: 0; }
.signal-item.gold { border-color: var(--green); background: rgba(16,185,129,0.08); }
.signal-item.dead { border-color: var(--red); background: rgba(239,68,68,0.08); }
.signal-item.risk { border-color: var(--amber); background: rgba(245,158,11,0.08); }
.signal-item.opportunity { border-color: var(--cyan); background: rgba(6,182,212,0.08); }
.signal-item.neutral { border-color: var(--text3); background: var(--surface); }
.signal-type { font-weight: 600; font-size: 0.75rem; margin-bottom: 0.1rem; display: flex; align-items: center; gap: 0.375rem; }
.signal-desc { font-size: 0.7rem; color: var(--text2); line-height: 1.4; }
.signal-recommend { font-size: 0.65rem; color: var(--amber); margin-top: 0.3rem; padding: 0.2rem 0.5rem; background: rgba(0,0,0,0.2); border-radius: 4px; display: inline-block; }

/* Signal Summary Bar */
.signal-summary { display: flex; gap: 0.4rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
.signal-badge { padding: 0.3rem 0.625rem; border-radius: 20px; font-size: 0.7rem; font-weight: 600; display: flex; align-items: center; gap: 0.2rem; }

/* Section Titles */
.section-title { font-size: 0.7rem; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 0.6rem; display: flex; align-items: center; gap: 0.5rem; }
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* Loading / Error */
.loading { text-align: center; padding: 4rem; color: var(--text2); }
.loading::after { content: ''; display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-left: 0.75rem; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
.error { text-align: center; padding: 4rem; color: var(--red); }
.hidden { display: none !important; }

/* Footer */
.footer { text-align: center; padding: 1.5rem; color: var(--text3); font-size: 0.7rem; border-top: 1px solid var(--border); margin-top: 1.5rem; }
.footer a { color: var(--accent); text-decoration: none; }

/* Data range badge */
.data-info-wrap { text-align: center; margin-bottom: 1rem; }
.data-info { font-size: 0.7rem; color: var(--text3); padding: 0.375rem 0.875rem; background: var(--surface); border-radius: 20px; display: inline-block; border: 1px solid var(--border); }

/* Metric explanation */
.metric-explain { font-size: 0.65rem; color: var(--text3); margin-top: 0.25rem; line-height: 1.4; }
</style>
</head>

<script>
const API = '/stock-api2';
let currentController = null;
let retryCount = 0;

async function api(path) {
    // 中止上一个请求
    if (currentController) currentController.abort();
    currentController = new AbortController();
    
    for (let attempt = 0; attempt < 2; attempt++) {
        try {
            const r = await fetch(API + path, { signal: currentController.signal, signal: AbortSignal.timeout(60000) });
            if (!r.ok) throw new Error('API error: ' + r.status);
            retryCount = 0;
            return await r.json();
        } catch(e) {
            if (e.name === 'AbortError') throw e;
            if (attempt === 1) { retryCount = 0; throw e; }
            retryCount++;
            await new Promise(r => setTimeout(r, 1000));
        }
    }
}

    adx: { name: 'ADX', cat: 'trend', title: '平均趋向指数', formula: 'ADX = MA(DX, 14)', desc: '趋势强度，数值越高趋势越强', advice: '>25趋势明确，<20震荡', range: '0-100，越高趋势越强' },
    adx_plus: { name: '+DI', cat: 'trend', title: '正向趋向指标', formula: '+DI = 100×MA(+DM/ATR)', desc: '上升趋向强度', advice: '+DI>-DI看多', range: '与-DI比较' },
    adx_minus: { name: '-DI', cat: 'trend', title: '负向趋向指标', formula: '-DI = 100×MA(-DM/ATR)', desc: '下降趋向强度', advice: '-DI>+DI看空', range: '与+DI比较' },
    atr: { name: 'ATR', cat: 'volatility', title: '平均真实波幅', formula: 'ATR = MA(TR, 14), TR=max(H-L,|H-PC|,|L-PC|)', desc: '衡量价格波动剧烈程度的指标', advice: 'ATR升高波动加大', range: '数值越大波动越剧烈' },
    cci: { name: 'CCI', cat: 'momentum', title: '顺势指标', formula: 'CCI = (TP-MA)/(0.015×MAD), TP=(H+L+C)/3', desc: '衡量价格偏离程度的指标', advice: '>100超买，<-100超卖', range: '无上下限，通常±100-300' },
    wr: { name: 'WR', cat: 'momentum', title: '威廉指标', formula: 'WR = -100×(HH-C)/(HH-LL)', desc: '超买超卖指标，与RSI反向', advice: '<-80超卖，>-20超买', range: '-100到0' },
    momentum: { name: 'MOM', cat: 'momentum', title: '动量指标', formula: 'MOM = Close - Close(n日前)', desc: '价格变化的速率', advice: ' MOM>0趋势向上', range: '正负交替' },
    roc: { name: 'ROC', cat: 'momentum', title: '变动率指标', formula: 'ROC = 100×(C-C(n))/C(n)', desc: '价格变化的百分比', advice: 'ROC>0强势，<0弱势', range: '围绕零轴波动' },
    stoch_k: { name: 'Stoch-K', cat: 'momentum', title: '随机K值(慢)', formula: 'K = 100×(C-L)/(H-L)平滑', desc: '慢速随机指标的K值', advice: '>80超买，<20超卖', range: '0-100' },
    stoch_d: { name: 'Stoch-D', cat: 'momentum', title: '随机D值(慢)', formula: 'D = MA(K, 3)', desc: 'K值的3日移动平均', advice: 'K上穿D买入', range: '0-100' },
    psy: { name: 'PSY', cat: 'momentum', title: '心理线', formula: 'PSY = 上涨天数/总天数×100', desc: '市场情绪指标', advice: '>75过于乐观，<25过于悲观', range: '0-100' },
    obv: { name: 'OBV', cat: 'volume', title: '能量潮', formula: 'OBV = Σ(Volume×sign(Close-Close_prev))', desc: '累计成交量，反映资金流向', advice: 'OBV与价格背离预警', range: '相对值无上下限' },
};

// 指标分类
const INDICATOR_CATS = {
    trend: 'trendIndicators',
    momentum: 'momentumIndicators',
    volatility: 'volatilityIndicators',
    volume: 'volumeIndicators'
};

// 指标颜色
const INDICATOR_COLORS = {
    up: 'var(--green)', down: 'var(--red)', neutral: 'var(--text)', 
    excellent: 'var(--green)', good: 'var(--cyan)', warning: 'var(--amber)', bad: 'var(--red)'
};

function getIndicatorColor(colorKey) {
    return INDICATOR_COLORS[colorKey] || 'var(--text)';
}

function cls(key, v) {
    const n = Number(v);
    if (key === 'annualized_return' || key === 'total_return') return n > 0 ? 'up' : n < 0 ? 'down' : 'neutral';
    if (key === 'sharpe_ratio' || key === 'sortino_ratio' || key === 'calmar_ratio' || key === 'information_ratio') return n > 1.5 ? 'excellent' : n > 0.8 ? 'good' : n > 0 ? 'warning' : 'bad';
    if (key === 'win_rate') return n > 60 ? 'excellent' : n > 45 ? 'good' : n > 0 ? 'warning' : 'bad';
    if (key === 'max_drawdown') return n < 10 ? 'excellent' : n < 20 ? 'good' : n < 30 ? 'warning' : 'bad';
    if (key === 'profit_loss_ratio') return n > 2 ? 'excellent' : n > 1.5 ? 'good' : n > 1 ? 'warning' : 'bad';
    return 'neutral';
}

function showLoading() {
    document.getElementById('resultArea').classList.add('hidden');
    document.getElementById('errorArea').classList.add('hidden');
    document.getElementById('loadingArea').classList.remove('hidden');
}
function showError(msg) {
    document.getElementById('resultArea').classList.add('hidden');
    document.getElementById('loadingArea').classList.add('hidden');
    const el = document.getElementById('errorArea');
    el.textContent = msg;
    el.classList.remove('hidden');
}
function showResult() {
    document.getElementById('loadingArea').classList.add('hidden');
    document.getElementById('errorArea').classList.add('hidden');
    document.getElementById('resultArea').classList.remove('hidden');
}

async function backtest() {
    const input = document.getElementById('stockInput').value.trim().toUpperCase();
    const fast = parseInt(document.getElementById('fastPeriod').value) || 10;
    const slow = parseInt(document.getElementById('slowPeriod').value) || 20;
    if (!input) return;
    let code = input.replace(/^(SH|SZ)/, '');
    if (!/^\d{6}$/.test(code)) { showError('请输入6位股票代码'); return; }
    code = code.startsWith('6') ? 'SH' + code : 'SZ' + code;
    document.getElementById('searchBtn').disabled = true;
    showLoading();
    try {
        const d = await api('/api/backtest/' + code.replace(/^(SH|SZ)/, '') + '?fast=' + fast + '&slow=' + slow);
        if (!d?.success) { showError(d?.error || '分析失败，请稍后重试'); return; }
        renderResult(d);
        showResult();
    } catch(e) { showError('分析失败: ' + e.message); } finally {
        document.getElementById('searchBtn').disabled = false;
    }
}

function renderResult(d) {
    const stock = d.stock, bt = d.backtest || {}, ind = d.indicators || {}, signals = d.signals || [], params = d.parameters || {};
    
    const price = parseFloat(stock.price) || 0;
    const change = parseFloat(stock.change) || 0;
    const changePct = parseFloat(stock.changePct) || 0;
    const up = changePct >= 0;
    
    document.getElementById('stockName').textContent = stock.name || stock.code;
    document.getElementById('stockCode').textContent = stock.code + ' | MA' + params.fast_period + '/' + params.slow_period + ' 交叉策略';
    
    const pe = document.getElementById('stockPrice');
    pe.textContent = price > 0 ? price.toFixed(2) : '--';
    pe.className = 'stock-price ' + (up ? 'up' : 'down');
    
    const ce = document.getElementById('stockChange');
    if (price > 0 && changePct !== 0) {
        const sign = up ? '+' : '';
        ce.textContent = `${sign}${change.toFixed(2)} (${sign}${changePct.toFixed(2)}%)`;
    } else {
        ce.textContent = '--';
    }
    ce.className = 'stock-change ' + (up ? 'up' : 'down');
    
    const curVol = ind.current_volume;
    document.getElementById('stockOHL').innerHTML = ind.current_high && ind.current_low
        ? `最高 ${ind.current_high.toFixed(2)}<br>最低 ${ind.current_low.toFixed(2)}`
        : '';
    document.getElementById('stockVolume').innerHTML = curVol
        ? `成交量 ${(curVol / 10000).toFixed(0)}万`
        : '';
    
    // 信号标签
    const bullish = ind.ma_bullish;
    const bearish = ind.ma_bearish;
    const tagEl = document.getElementById('stockTags');
    tagEl.innerHTML = '';
    if (bullish) tagEl.innerHTML += '<span style="padding:0.2rem 0.5rem;background:rgba(16,185,129,0.15);color:var(--green);border-radius:4px;font-size:0.65rem;font-weight:600">📈 多头排列</span>';
    if (bearish) tagEl.innerHTML += '<span style="padding:0.2rem 0.5rem;background:rgba(239,68,68,0.15);color:var(--red);border-radius:4px;font-size:0.65rem;font-weight:600">📉 空头排列</span>';
    
    document.getElementById('dataInfo').textContent = '数据范围: ' + (d.data_info?.date_range || '--') + ' | 共 ' + (d.data_info?.data_points || 0) + ' 个交易日 | 跨度 ' + (d.data_info?.actual_years || '--') + ' 年';
    
    // Signal summary
    const signalCounts = { gold: 0, dead: 0, risk: 0, opportunity: 0, neutral: 0 };
    signals.forEach(s => { if (signalCounts[s.signal] !== undefined) signalCounts[s.signal]++; });
    const signalSummary = document.getElementById('signalSummary');
    signalSummary.innerHTML = '';
    if (signalCounts.gold > 0) signalSummary.innerHTML += `<span class="signal-badge gold">📈 多头信号 ${signalCounts.gold}</span>`;
    if (signalCounts.opportunity > 0) signalSummary.innerHTML += `<span class="signal-badge opportunity">💡 买入机会 ${signalCounts.opportunity}</span>`;
    if (signalCounts.risk > 0) signalSummary.innerHTML += `<span class="signal-badge risk">⚠️ 风险警示 ${signalCounts.risk}</span>`;
    if (signalCounts.dead > 0) signalSummary.innerHTML += `<span class="signal-badge dead">📉 空头信号 ${signalCounts.dead}</span>`;
    if (signalCounts.neutral > 0) signalSummary.innerHTML += `<span class="signal-badge neutral">➡️ 中性信号 ${signalCounts.neutral}</span>`;
    
    // Signals list
    const icons = { gold: '📈', dead: '📉', risk: '⚠️', opportunity: '💡', neutral: '➡️' };
    const colors = { gold: 'gold', dead: 'dead', risk: 'risk', opportunity: 'opportunity', neutral: 'neutral' };
    document.getElementById('signalsList').innerHTML = signals.slice(0, 8).map(s => 
        `<div class="signal-item ${colors[s.signal] || 'neutral'}"><div class="signal-type">${icons[s.signal] || '➡️'} ${s.type}</div><div class="signal-desc">${s.desc}</div><div class="signal-recommend">💡 ${s.recommend}</div></div>`
    ).join('');
    
    // Backtest parameters
    const backtestParams = [
        { k: 'initial_capital', l: '初始资金', u: '元', desc: '回测起始资金' },
        { k: 'final_capital', l: '最终资金', u: '元', desc: '回测结束资金' },
        { k: 'commission_rate', l: '佣金费率', u: '', desc: '双向佣金+滑点合计' },
        { k: 'avg_holding_period', l: '平均持仓', u: '天/交易', desc: '每笔交易平均持仓时长' },
    ];
    document.getElementById('backtestParams').innerHTML = backtestParams.map(m => {
        let val = bt[m.k];
        let color = 'neutral';
        if (m.k === 'final_capital') {
            const init = bt['initial_capital'] || 1;
            color = val >= init ? 'up' : 'down';
            val = val ? val.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}) : '--';
        } else if (m.k === 'commission_rate') {
            val = val != null ? (val * 100).toFixed(2) + '%' : '--';
        } else {
            val = fmt(val);
        }
        return `<div class="metric-card">
            <div class="metric-label">${m.l}</div>
            <div class="metric-value ${cls(m.k, bt[m.k])}">${val}${m.u && !['元','%'].includes(m.u) ? m.u : ''}</div>
            <div class="metric-sub">${m.desc}</div>
        </div>`;
    }).join('');
    
    // Return metrics
    const returnMetrics = [
        { k: 'annualized_return', l: '年化收益率', u: '%', desc: '年化后的策略收益率' },
        { k: 'total_return', l: '总收益率', u: '%', desc: '回测期间总收益' },
        { k: 'win_rate', l: '胜率', u: '%', desc: '盈利交易占比' },
        { k: 'profit_loss_ratio', l: '盈亏比', u: '倍', desc: '平均盈利/平均亏损' },
    ];
    document.getElementById('returnMetrics').innerHTML = returnMetrics.map(m => `
        <div class="metric-card">
            <div class="metric-label">${m.l}</div>
            <div class="metric-value ${cls(m.k, bt[m.k])}">${fmt(bt[m.k])}${m.u}</div>
            <div class="metric-sub">${m.desc}</div>
        </div>
    `).join('');
    
    // Risk metrics
    const riskMetrics = [
        { k: 'max_drawdown', l: '最大回撤', u: '%', desc: '历史最大亏损幅度' },
        { k: 'sharpe_ratio', l: '夏普比率', u: '', desc: '风险调整收益，>1.5优秀' },
        { k: 'sortino_ratio', l: '索提诺比率', u: '', desc: '下行风险调整，>1.5优秀' },
        { k: 'calmar_ratio', l: '卡尔玛比率', u: '', desc: '收益/最大回撤，>1优秀' },
        { k: 'alpha', l: 'Alpha(α)', u: '%', desc: '超额收益，相对市场' },
        { k: 'beta', l: 'Beta(β)', u: '', desc: '市场敏感度，1=同步' },
        { k: 'information_ratio', l: '信息比率', u: '', desc: '跟踪误差调整收益' },
        { k: 'tracking_error', l: '跟踪误差', u: '%', desc: '与基准偏差程度' },
    ];
    document.getElementById('riskMetrics').innerHTML = riskMetrics.map(m => `
        <div class="metric-card">
            <div class="metric-label">${m.l}</div>
            <div class="metric-value ${cls(m.k, bt[m.k])}">${fmt(bt[m.k])}${m.u}</div>
            <div class="metric-sub">${m.desc}</div>
        </div>
    `).join('');
    
    // Trading metrics
    const tradingMetrics = [
        { k: 'total_trades', l: '交易次数', u: '次', desc: '总交易买卖次数' },
        { k: 'winning_trades', l: '盈利交易', u: '次', desc: '盈利的成交次数' },
        { k: 'losing_trades', l: '亏损交易', u: '次', desc: '亏损的成交次数' },
        { k: 'avg_win', l: '平均盈利', u: '%', desc: '盈利交易平均收益' },
        { k: 'avg_loss', l: '平均亏损', u: '%', desc: '亏损交易平均亏损' },
        { k: 'profit_loss_ratio', l: '盈亏比', u: '倍', desc: '平均盈利/平均亏损' },
    ];
    document.getElementById('tradingMetrics').innerHTML = tradingMetrics.map(m => `
        <div class="metric-card">
            <div class="metric-label">${m.l}</div>
            <div class="metric-value ${cls(m.k, bt[m.k])}">${fmt(bt[m.k])}${m.u}</div>
            <div class="metric-sub">${m.desc}</div>
        </div>
    `).join('');
    
    // Indicator cards
    const orderedInds = [
        'sma_5', 'sma_10', 'sma_20', 'sma_30', 'sma_60',
        'ema_12', 'ema_26', 'macd', 'macd_signal', 'macd_hist',
        'rsi_6', 'rsi_14', 'rsi_26', 'kdj_k', 'kdj_d', 'kdj_j',
        'adx', 'adx_plus', 'adx_minus', 'atr', 'cci', 'wr',
        'bb_upper', 'bb_middle', 'bb_lower', 'bb_width', 'bb_position',
        'stoch_k', 'stoch_d', 'momentum', 'roc', 'psy', 'obv'
    ];
    
    ['trendIndicators', 'momentumIndicators', 'volatilityIndicators', 'volumeIndicators'].forEach(cat => {
        document.getElementById(cat).innerHTML = '';
    });
    
    orderedInds.forEach(k => {
        if (ind[k] === undefined || ind[k] === null || isNaN(ind[k])) return;
        const info = INDICATOR_INFO[k];
        if (!info) return;
        const containerId = INDICATOR_CATS[info.cat];
        if (!containerId) return;
        
        // 判断颜色
        let color = 'neutral';
        if (k.includes('sma') || k.includes('ema')) {
            const cur = ind['current_price'] || 0;
            if (ind[k] && cur) color = cur > ind[k] ? 'up' : 'down';
        } else if (k.includes('rsi')) {
            const v = Number(ind[k]);
            if (v > 70) color = 'down'; else if (v < 30) color = 'up'; else color = 'neutral';
        } else if (k.includes('kdj')) {
            const v = Number(ind[k]);
            if (v > 80) color = 'down'; else if (v < 20) color = 'up'; else color = 'neutral';
        } else if (k.includes('macd')) {
            const v = Number(ind[k]);
            if (k === 'macd_hist') color = v > 0 ? 'up' : 'down';
            else color = v > 0 ? 'up' : 'down';
        } else if (k === 'wr') {
            const v = Number(ind[k]);
            if (v < -80) color = 'up'; else if (v > -20) color = 'down'; else color = 'neutral';
        } else if (k === 'cci') {
            const v = Number(ind[k]);
            if (v > 100) color = 'down'; else if (v < -100) color = 'up'; else color = 'neutral';
        } else if (k === 'psy') {
            const v = Number(ind[k]);
            if (v > 75) color = 'down'; else if (v < 25) color = 'up'; else color = 'neutral';
        } else if (k.includes('adx')) {
            const v = Number(ind[k]);
            if (k === 'adx' && v > 25) color = 'up'; else if (k === 'adx') color = v > 20 ? 'up' : 'neutral';
        }
        
        const decimal = (k === 'macd' || k === 'macd_signal' || k === 'macd_hist' || k === 'momentum' || k === 'roc') ? 3 : 2;
        const val = fmt(ind[k], decimal);
        
        const el = document.createElement('div');
        el.className = 'indicator-card';
        el.innerHTML = `
            <div class="indicator-label">${info.name}</div>
            <div class="indicator-value" style="color:${getIndicatorColor(color)}">${val}</div>
            <div class="indicator-tooltip">
                <div class="tooltip-title">${info.title}</div>
                <div class="tooltip-formula">${info.formula}</div>
                <div style="color:var(--text2);margin-bottom:0.375rem">${info.desc}</div>
                <div class="tooltip-advice">📊 ${info.advice}</div>
            </div>
        `;
        document.getElementById(containerId).appendChild(el);
    });
    
    // Indicator explanations section
    const mainInds = ['sma_20', 'sma_60', 'rsi_14', 'macd', 'kdj_k', 'bb_upper', 'adx', 'atr'];
    document.getElementById('indicatorExplain').innerHTML = mainInds.map(k => {
        const info = INDICATOR_INFO[k];
        if (!info) return '';
        const v = ind[k];
        if (v === undefined || v === null || isNaN(v)) return '';
        const decimal = (k === 'macd' || k === 'macd_signal' || k === 'macd_hist') ? 3 : 2;
        
        let advice = '';
        if (k === 'sma_20' || k === 'sma_60') {
            const cur = ind['current_price'] || 0;
            if (cur > v) advice = '价格位于MA上方，中期趋势偏多';
            else advice = '价格位于MA下方，中期趋势偏空';
        } else if (k === 'rsi_14') {
            const rv = Number(v);
            if (rv > 70) advice = 'RSI超买区域，警惕短期回调风险';
            else if (rv < 30) advice = 'RSI超卖区域，关注超跌反弹机会';
            else advice = 'RSI在正常区间，趋势延续';
        } else if (k === 'macd') {
            const mv = Number(v);
            const sv = Number(ind.macd_signal);
            if (mv > sv && mv > 0) advice = 'MACD多头区域，红柱动能充足';
            else if (mv < sv && mv < 0) advice = 'MACD空头区域，绿柱动能占优';
            else advice = 'MACD接近零轴，方向不明';
        } else if (k === 'kdj_k') {
            const kv = Number(v);
            if (kv > 80) advice = 'KDJ超买，注意短期回调';
            else if (kv < 20) advice = 'KDJ超卖，超跌反弹可期';
            else advice = 'KDJ在正常区间';
        } else if (k === 'bb_upper') {
            const cur = ind['current_price'] || 0;
            const bl = ind.bb_lower;
            if (cur >= v * 0.99) advice = '价格触及布林上轨，压力明显';
            else if (cur <= bl * 1.01) advice = '价格触及布林下轨，支撑明显';
            else advice = '价格在中轨附近震荡';
        } else if (k === 'adx') {
            const av = Number(v);
            if (av > 25) advice = 'ADX>25，趋势明确';
            else advice = 'ADX<25，趋势不明显，震荡市';
        } else if (k === 'atr') {
            advice = 'ATR反映市场波动水平，数值越大波动越剧烈';
        }
        
        return `
            <div style="margin-bottom:1rem;padding:0.75rem;background:var(--surface);border-radius:8px;border-left:3px solid var(--accent)">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.25rem">
                    <span style="font-weight:600;font-size:0.85rem">${info.title}</span>
                    <span style="font-family:'JetBrains Mono',monospace;font-weight:700;font-size:1rem">${fmt(v, decimal)}</span>
                </div>
                <div style="font-size:0.75rem;color:var(--text2);margin-bottom:0.25rem">${info.desc}</div>
                <div style="font-size:0.7rem;color:var(--amber)">💡 ${advice}</div>
            </div>
        `;
    }).join('');
}
</script>
